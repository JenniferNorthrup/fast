version: "3.9"

services:

  api:
    build: ./app
    container_name: fastapi-api
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - pgbouncer
    environment:
      POSTGRES_HOST: pgbouncer
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass

      REDIS_HOST: redis
      REDIS_PORT: 6379

    volumes:
      - ./app:/app

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  pgbouncer:
    image: edoburu/pgbouncer
    container_name: pgbouncer
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: appuser
      DB_PASSWORD: apppass
      DB_NAME: appdb
    ports:
      - "6432:6432"

volumes:
  pgdata: